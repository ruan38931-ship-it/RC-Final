<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RC Celulares - Sistema de Ordem de Serviços</title>
  <meta name="description" content="Sistema de gerenciamento de ordens de serviço para assistência técnica" />
  <link rel="stylesheet" href="styles.css" />
  <!-- QRCode.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

<!-- ============================================
     TOAST CONTAINER
     ============================================ -->
<div id="toastContainer" class="toast-container"></div>

<!-- ============================================
     MODAL DE FINALIZAÇÃO DE ORDEM
     ============================================ -->
<div id="completeModal" class="modal-overlay">
  <div class="modal" style="max-width: 460px;">
    <div class="modal-title">Finalizar Ordem de Serviço</div>
    <div class="modal-description">
      Informe o valor e a forma de pagamento.
    </div>
    <div class="space-y-4">
      <div style="padding: 0.75rem; background: #f8fafc; border-radius: var(--radius); border: 1px solid #e2e8f0;">
        <div class="text-sm font-medium" id="completeOrderDevice">-</div>
        <div class="text-sm" style="color: var(--muted-foreground)" id="completeOrderCustomer">-</div>
      </div>

      <div class="form-group">
        <label for="completeAmount">Valor Total (R$)</label>
        <input type="number" id="completeAmount" placeholder="0.00" min="0" step="0.01" style="font-size: 1.2rem; padding: 0.75rem;" />
      </div>

      <div class="form-group">
        <label>Forma de Pagamento</label>
        <div class="payment-options" id="paymentOptions"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="btnCancelComplete" class="btn btn-outline">Cancelar</button>
      <button id="btnConfirmComplete" class="btn btn-primary">Finalizar e Gerar Recibo</button>
    </div>
  </div>
</div>

<!-- ============================================
     MODAL DE RECIBO DIGITAL
     ============================================ -->
<div id="receiptModal" class="modal-overlay">
  <div class="modal" style="max-width: 500px;">
    <div class="modal-title" style="text-align:center;">✅ Recibo Digital</div>
    
    <div id="receiptContent" style="background: white; border: 2px dashed #e2e8f0; border-radius: var(--radius); padding: 1.5rem; margin: 1rem 0; max-height: 60vh; overflow-y: auto;"></div>

    <div class="modal-footer" style="gap: 0.75rem;">
      <button id="btnCloseReceipt" class="btn btn-outline">Fechar</button>
      <button id="btnSendWhatsApp" class="btn btn-outline" style="background:#25D366; color:white; border:none;">
        📱 Enviar via WhatsApp
      </button>
      <button id="btnPrintReceipt" class="btn btn-primary">
        🖨️ Imprimir
      </button>
    </div>
  </div>
</div>

<!-- ============================================
     BOTÃO FLUTUANTE WHATSAPP
     ============================================ -->
<a href="https://wa.me/5588988237784" 
   id="btnWhatsApp" 
   target="_blank"
   class="whatsapp-float">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15.5c0 .83-.67 1.5-1.5 1.5H15l-3 3-3-3H4.5C3.67 17 3 16.33 3 15.5V5.5C3 4.67 3.67 4 4.5 4h15c.83 0 1.5.67 1.5 1.5v10z"/>
    <path d="M8 10h.01M12 10h.01M16 10h.01"/>
  </svg>
  Fale Conosco
</a>

<!-- ============================================
     PÁGINA: LOGIN
     ============================================ -->
<div id="page-login" class="page bg-gradient-page">
  <!-- ... (todo o conteúdo de login que você já tinha) ... -->
  <div class="login-page">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="flex justify-center">
          <div class="logo">
            <img src="logo.jpeg" alt="RC Celulares" class="logo-img logo-img-lg" />
            <div>
              <div class="logo-text-title">RC Celulares</div>
              <div class="logo-text-subtitle">Assistência Técnica</div>
            </div>
          </div>
        </div>
        <h1 class="login-title">Sistema de Ordem de Serviços</h1>
        <p class="login-subtitle">Faça login para acessar o sistema</p>
      </div>

      <!-- Error -->
      <div id="loginError"></div>

      <!-- Tabs -->
      <div id="loginTabs">
        <div class="tabs-list tabs-list-2" style="margin-bottom: 1.5rem;">
          <button class="tab-trigger active" data-tab="cliente">Cliente</button>
          <button class="tab-trigger" data-tab="funcionario">Funcionário</button>
        </div>

        <!-- Tab Cliente -->
        <div id="tab-cliente" class="tab-content active">
          <form id="formClient" class="space-y-4">
            <div class="form-group">
              <label for="clientName">Nome Completo</label>
              <input type="text" id="clientName" placeholder="Digite seu nome" required />
            </div>
            <div class="form-group">
              <label for="clientPhone">Telefone</label>
              <input type="tel" id="clientPhone" placeholder="(00) 00000-0000" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Acessar Como Cliente</button>
          </form>
        </div>

        <!-- Tab Funcionário -->
        <div id="tab-funcionario" class="tab-content">
          <form id="formEmployee" class="space-y-4">
            <div class="form-group">
              <label for="employeeCode">Código do Funcionário</label>
              <input type="text" id="employeeCode" placeholder="Digite seu código" required />
            </div>
            <div class="form-group">
              <label for="employeePassword">Senha</label>
              <input type="password" id="employeePassword" placeholder="Digite sua senha" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Acessar Como Funcionário</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- O resto das páginas (admin, cliente) continua igual... -->
<!-- (Se você quiser, posso te mandar o arquivo completo depois) -->

<script src="app.js"></script>
</body>
</html>
